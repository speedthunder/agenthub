<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentHub – 我的 Agents</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e42;
    --accent: #6c63ff; --accent2: #48d1cc;
    --text: #e8e8f0; --muted: #888;
    --danger: #e05252; --success: #48d1cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  a { color: var(--accent2); text-decoration: none; }
  /* nav */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  nav .logo { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  nav .nav-right { display: flex; gap: 12px; align-items: center; }
  /* main */
  main { max-width: 960px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.6rem; margin-bottom: 24px; }
  /* card grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: border-color .2s; overflow: hidden; }
  .card:hover { border-color: var(--accent); }
  .card-cover { margin: -20px -20px 0 -20px; height: 140px; overflow: hidden; background: #0d1117; }
  .card-cover img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .card-header { display: flex; align-items: center; gap: 10px; }
  .avatar { font-size: 2rem; line-height: 1; }
  .card-title { font-weight: 600; font-size: 1rem; }
  .card-desc { color: var(--muted); font-size: .85rem; flex: 1; }
  .badge { font-size: .7rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .badge-public { background: #1a3a2a; color: var(--success); }
  .badge-private { background: #3a1a1a; color: var(--danger); }
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  /* buttons */
  .btn { border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: .85rem; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: .78rem; }
  /* modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { margin-bottom: 20px; font-size: 1.2rem; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: 5px; }
  input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: .9rem; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  /* auth page */
  .auth-card { max-width: 380px; margin: 80px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; }
  .auth-card h2 { text-align: center; margin-bottom: 24px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: .9rem; background: transparent; color: var(--muted); border: none; transition: all .2s; }
  .auth-tab.active { background: var(--accent); color: #fff; }
  .share-row { display: flex; gap: 8px; align-items: center; }
  .share-link { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: .8rem; color: var(--accent2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: .9rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* upload zone */
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: border-color .2s; display: block; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-preview { width: 100%; max-height: 100px; object-fit: cover; border-radius: 8px; margin-top: 8px; display: none; }
  .upload-info { font-size: .78rem; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>

<!-- Auth Page -->
<div id="auth-page" style="display:none">
  <div class="auth-card">
    <h2>🤖 AgentHub</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登入</button>
      <button class="auth-tab" onclick="switchTab('register')">註冊</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Email</label><input id="login-email" type="email" placeholder="you@example.com"></div>
      <div class="form-group"><label>密碼</label><input id="login-pw" type="password" placeholder="••••••"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">登入</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>使用者名稱</label><input id="reg-username" placeholder="cooluser"></div>
      <div class="form-group"><label>Email</label><input id="reg-email" type="email" placeholder="you@example.com"></div>
      <div class="form-group"><label>密碼</label><input id="reg-pw" type="password" placeholder="••••••"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doRegister()">建立帳號</button>
    </div>
    <div style="display:flex;align-items:center;margin:18px 0 12px;gap:8px;font-size:.82rem;color:var(--muted)">
      <hr style="flex:1;border:none;border-top:1px solid var(--border)"><span>或</span><hr style="flex:1;border:none;border-top:1px solid var(--border)">
    </div>
    <div id="google-btn" style="display:flex;justify-content:center;min-height:44px"></div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none">
  <nav>
    <span class="logo">🤖 AgentHub</span>
    <div class="nav-right">
      <span id="nav-username" style="color:var(--muted);font-size:.9rem"></span>
      <a href="/agenthub/static/profile.html" class="btn btn-outline btn-sm" style="text-decoration:none">⚙ 個人設定</a>
      <a href="/agenthub/static/memory.html" class="btn btn-outline btn-sm" style="text-decoration:none">🧠 我的記憶</a>
      <a href="/agenthub/static/kb.html" class="btn btn-outline btn-sm" style="text-decoration:none">📚 知識庫</a>
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ 新建 Agent</button>
      <button class="btn btn-outline btn-sm" onclick="logout()">登出</button>
    </div>
  </nav>
  <main>
    <h1>我的 Agents</h1>
    <div id="agent-grid" class="grid"></div>
  </main>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="agent-modal">
  <div class="modal">
    <h2 id="modal-title">建立新 Agent</h2>
    <input type="hidden" id="edit-id">

    <!-- 基本資訊 -->
    <div class="form-row">
      <div class="form-group"><label>名稱 *</label><input id="f-name" placeholder="我的客服 Agent"></div>
      <div class="form-group"><label>頭像 Emoji / 圖片URL</label><input id="f-avatar" value="🤖" placeholder="🤖 或 https://…"></div>
    </div>
    <div class="form-group"><label>描述</label><input id="f-desc" placeholder="這個 Agent 的用途…"></div>
    <div class="form-group">
      <label>封面圖片</label>
      <input type="hidden" id="f-cover">
      <label class="upload-zone" id="cover-zone" for="cover-file" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event,'cover');event.preventDefault()">
        <input type="file" id="cover-file" accept="image/*" style="display:none" onchange="handleFileSelect(this,'cover')">
        <div id="cover-zone-text" style="color:var(--muted);font-size:.85rem;text-align:center;line-height:1.6">
          點擊或拖曳上傳封面圖<br>
          <span style="font-size:.78rem;opacity:.75">建議 3:1 橫幅（如 1500×500），最大 1600×600</span>
        </div>
        <img id="cover-preview" class="upload-preview">
        <div id="cover-info" class="upload-info"></div>
      </label>
    </div>
    <div class="form-row">
      <div class="form-group"><label>主色調（Hex）</label><input id="f-theme" value="#6c63ff" placeholder="#6c63ff" style="width:100%"><input type="color" id="f-theme-picker" value="#6c63ff" style="width:36px;height:36px;border:none;background:none;cursor:pointer;padding:0;margin-top:4px" oninput="document.getElementById('f-theme').value=this.value"></div>
      <div class="form-group"><label>歡迎訊息（開場白）</label><textarea id="f-welcome" rows="2" placeholder="您好！我是…，我可以幫您…"></textarea></div>
    </div>

    <!-- 快捷提問 -->
    <div class="form-group">
      <label>快捷提問按鈕（每行一則，顯示在輸入框上方）</label>
      <textarea id="f-suggestions" rows="3" placeholder="幫我寫一封 Email&#10;翻譯以下文字&#10;幫我摘要重點"></textarea>
    </div>

    <!-- 技能選單 -->
    <div class="form-group">
      <label>技能選單（每行：圖示 標籤｜前綴Prompt，例：✍️ 寫作｜請幫我寫）</label>
      <textarea id="f-skills" rows="3" placeholder="✍️ 寫作｜請幫我撰寫：&#10;🌐 翻譯｜請將以下文字翻譯成英文：&#10;📋 摘要｜請幫我摘要以下內容："></textarea>
    </div>

    <!-- 系統設定 -->
    <div class="form-group"><label>系統 Prompt *</label><textarea id="f-system" rows="4" placeholder="You are a helpful assistant…"></textarea></div>
    <div class="form-row">
      <div class="form-group">
        <label>LLM 提供商</label>
        <select id="f-provider" onchange="onProviderChange()">
          <option value="ollama">Ollama（本機）</option>
          <option value="openai">OpenAI</option>
          <option value="azure">Azure OpenAI</option>
        </select>
      </div>
      <div class="form-group"><label>模型名稱</label><input id="f-model" value="llama3"></div>
    </div>
    <div class="form-group" id="group-base-url"><label>Base URL</label><input id="f-base-url" value="http://localhost:11434"></div>
    <div class="form-group" id="group-api-key"><label>API Key</label><input id="f-api-key" type="password" placeholder="sk-…（可留空）"></div>
    <div class="form-row">
      <div class="form-group"><label>Temperature (0–2)</label><input id="f-temp" type="number" value="0.7" step="0.1" min="0" max="2"></div>
      <div class="form-group"><label>Max Tokens</label><input id="f-tokens" type="number" value="1024" step="64" min="64" max="8192"></div>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="f-public" checked style="width:auto;margin-right:6px">公開（任何人可透過分享連結使用）</label>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveAgent()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = '/agenthub';  // 統一代理路徑
let token = localStorage.getItem('agenthub_token');
let currentUser = null;

// ── Init ──────────────────────────────────────────────────
async function init() {
  if (!token) { showAuth(); return; }
  try {
    const res = await api('GET', '/auth/me');
    currentUser = res;
    document.getElementById('nav-username').textContent = res.username;
    showApp();
    loadAgents();
  } catch { showAuth(); }
}

// ── Auth ──────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-page').style.display = '';
  document.getElementById('app').style.display = 'none';
  initGoogleSignIn();
}

async function initGoogleSignIn() {
  try {
    const res = await fetch(BASE + '/auth/config');
    const {google_client_id} = await res.json();
    if (!google_client_id) return;
    let attempts = 0;
    while (!window.google?.accounts && attempts < 30) {
      await new Promise(r => setTimeout(r, 100));
      attempts++;
    }
    if (!window.google?.accounts) return;
    google.accounts.id.initialize({
      client_id: google_client_id,
      callback: async (resp) => {
        try {
          const r = await api('POST', '/auth/google', {credential: resp.credential});
          token = r.access_token;
          localStorage.setItem('agenthub_token', token);
          init();
        } catch(e) { toast('Google 登入失敗：' + (e.detail || e.message || ''), true); }
      }
    });
    google.accounts.id.renderButton(
      document.getElementById('google-btn'),
      {theme: 'outline', size: 'large', text: 'signin_with', locale: 'zh_TW', width: 300}
    );
  } catch(e) { console.error('Google Sign-In init failed', e); }
}
function showApp() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app').style.display = '';
}
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pw').value;
  try {
    const res = await api('POST', '/auth/login', { email, password });
    token = res.access_token;
    localStorage.setItem('agenthub_token', token);
    init();
  } catch(e) { toast('登入失敗：' + (e.detail || '請確認帳號密碼'), true); }
}
async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pw').value;
  try {
    const res = await api('POST', '/auth/register', { username, email, password });
    token = res.access_token;
    localStorage.setItem('agenthub_token', token);
    init();
  } catch(e) { toast('註冊失敗：' + (e.detail || '請確認資料'), true); }
}
function logout() {
  token = null; localStorage.removeItem('agenthub_token');
  showAuth();
}

// ── Agents ────────────────────────────────────────────────
async function loadAgents() {
  const agents = await api('GET', '/agents');
  const grid = document.getElementById('agent-grid');
  if (!agents.length) { grid.innerHTML = '<p style="color:var(--muted)">還沒有 Agent，點擊「新建 Agent」開始！</p>'; return; }
  grid.innerHTML = agents.map(a => `
    <div class="card">
      ${a.cover_image_url ? `<div class="card-cover"><img src="${esc(a.cover_image_url)}" alt="cover"></div>` : ''}
      <div class="card-header">
        <span class="avatar">${a.avatar}</span>
        <div>
          <div class="card-title">${esc(a.name)}</div>
          <span class="badge ${a.is_public ? 'badge-public' : 'badge-private'}">${a.is_public ? '公開' : '私人'}</span>
        </div>
      </div>
      <div class="card-desc">${esc(a.description) || '<em>無描述</em>'}</div>
      ${a.is_public ? `
      <div class="share-row">
        <span class="share-link">${location.origin}/agenthub/share/${a.slug}</span>
        <button class="btn btn-outline btn-sm" onclick="copyShare('${a.slug}')">複製</button>
        <a href="/agenthub/share/${a.slug}" target="_blank" class="btn btn-outline btn-sm">開啟</a>
      </div>` : ''}
      <div class="card-actions">
        <button class="btn btn-outline btn-sm" onclick="openEditModal(${a.id})">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteAgent(${a.id}, '${esc(a.name)}')">刪除</button>
      </div>
    </div>
  `).join('');
}

// ── Modal ─────────────────────────────────────────────────
const PROVIDER_DEFAULTS = {
  ollama: { base_url: 'http://localhost:11434', model: 'llama3' },
  openai: { base_url: 'https://api.openai.com/v1', model: 'gpt-4o' },
  azure:  { base_url: 'https://<resource>.openai.azure.com/openai/deployments/<deployment>', model: 'gpt-4o' },
};

function onProviderChange() {
  const p = document.getElementById('f-provider').value;
  const d = PROVIDER_DEFAULTS[p];
  document.getElementById('f-base-url').value = d.base_url;
  document.getElementById('f-model').value = d.model;
  document.getElementById('group-api-key').style.display = p === 'ollama' ? 'none' : '';
}

function openCreateModal() {
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-title').textContent = '建立新 Agent';
  document.getElementById('f-name').value = '';
  document.getElementById('f-avatar').value = '🤖';
  document.getElementById('f-desc').value = '';
  resetUploadZone('cover');
  document.getElementById('f-theme').value = '#6c63ff';
  document.getElementById('f-theme-picker').value = '#6c63ff';
  document.getElementById('f-welcome').value = '';
  document.getElementById('f-suggestions').value = '';
  document.getElementById('f-skills').value = '';
  document.getElementById('f-system').value = 'You are a helpful assistant.';
  document.getElementById('f-provider').value = 'ollama';
  document.getElementById('f-model').value = 'llama3';
  document.getElementById('f-base-url').value = 'http://localhost:11434';
  document.getElementById('f-api-key').value = '';
  document.getElementById('f-temp').value = '0.7';
  document.getElementById('f-tokens').value = '1024';
  document.getElementById('f-public').checked = true;
  document.getElementById('group-api-key').style.display = 'none';
  document.getElementById('agent-modal').classList.add('open');
}

async function openEditModal(id) {
  const agents = await api('GET', '/agents');
  const a = agents.find(x => x.id === id);
  if (!a) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('modal-title').textContent = '編輯 Agent';
  document.getElementById('f-name').value = a.name;
  document.getElementById('f-avatar').value = a.avatar;
  document.getElementById('f-desc').value = a.description;
  document.getElementById('f-cover').value = a.cover_image_url || '';
  // 顯示現有封面預覽
  if (a.cover_image_url) {
    setUploadPreview('cover', a.cover_image_url, '（現有封面）');
  } else {
    resetUploadZone('cover');
  }
  const theme = a.theme_color || '#6c63ff';
  document.getElementById('f-theme').value = theme;
  document.getElementById('f-theme-picker').value = theme;
  document.getElementById('f-welcome').value = a.welcome_message || '';
  document.getElementById('f-suggestions').value = (a.suggested_prompts || []).join('\n');
  document.getElementById('f-skills').value = (a.skills || []).map(s => `${s.icon || ''} ${s.label}｜${s.prompt || ''}`).join('\n');
  document.getElementById('f-system').value = a.system_prompt;
  document.getElementById('f-provider').value = a.llm_provider;
  document.getElementById('f-model').value = a.llm_model;
  document.getElementById('f-base-url').value = a.llm_base_url;
  document.getElementById('f-api-key').value = '';
  document.getElementById('f-temp').value = a.temperature;
  document.getElementById('f-tokens').value = a.max_tokens;
  document.getElementById('f-public').checked = a.is_public;
  document.getElementById('group-api-key').style.display = a.llm_provider === 'ollama' ? 'none' : '';
  document.getElementById('agent-modal').classList.add('open');
}

function closeModal() { document.getElementById('agent-modal').classList.remove('open'); }

async function saveAgent() {
  const id = document.getElementById('edit-id').value;

  // parse suggested_prompts: split by newline, filter blank
  const sugRaw = document.getElementById('f-suggestions').value;
  const suggested_prompts = sugRaw.split('\n').map(s => s.trim()).filter(Boolean);

  // parse skills: "icon label｜prompt" per line
  const skillsRaw = document.getElementById('f-skills').value;
  const skills = skillsRaw.split('\n').map(line => {
    const [labelPart, prompt] = line.split('｜');
    if (!labelPart) return null;
    const match = labelPart.trim().match(/^(\S+)\s+(.+)$/);
    if (match) return { icon: match[1], label: match[2].trim(), prompt: (prompt || '').trim() };
    return { icon: '⚡', label: labelPart.trim(), prompt: (prompt || '').trim() };
  }).filter(Boolean);

  const body = {
    name: document.getElementById('f-name').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    avatar: document.getElementById('f-avatar').value.trim() || '🤖',
    cover_image_url: document.getElementById('f-cover').value.trim(),
    theme_color: document.getElementById('f-theme').value.trim() || '#6c63ff',
    welcome_message: document.getElementById('f-welcome').value.trim(),
    suggested_prompts,
    skills,
    system_prompt: document.getElementById('f-system').value.trim(),
    llm_provider: document.getElementById('f-provider').value,
    llm_model: document.getElementById('f-model').value.trim(),
    llm_base_url: document.getElementById('f-base-url').value.trim(),
    llm_api_key: document.getElementById('f-api-key').value,
    temperature: parseFloat(document.getElementById('f-temp').value),
    max_tokens: parseInt(document.getElementById('f-tokens').value),
    is_public: document.getElementById('f-public').checked,
  };
  if (!body.name) { toast('名稱不能為空', true); return; }
  try {
    if (id) await api('PUT', `/agents/${id}`, body);
    else await api('POST', '/agents', body);
    closeModal();
    toast(id ? 'Agent 已更新' : 'Agent 已建立 🎉');
    loadAgents();
  } catch(e) { toast('儲存失敗：' + (e.detail || ''), true); }
}

async function deleteAgent(id, name) {
  if (!confirm(`確定要刪除「${name}」嗎？`)) return;
  await api('DELETE', `/agents/${id}`);
  toast(`「${name}」已刪除`);
  loadAgents();
}

function copyShare(slug) {
  navigator.clipboard.writeText(`${location.origin}/share/${slug}`);
  toast('連結已複製！');
}

// ── Image upload helpers ──────────────────────────────────
const COVER_MAX_W = 1600, COVER_MAX_H = 600;
const UPLOAD_QUALITY = 0.82; // JPEG quality for canvas export

function resetUploadZone(kind) {
  document.getElementById('f-' + kind).value = '';
  const preview = document.getElementById(kind + '-preview');
  if (preview) { preview.src = ''; preview.style.display = 'none'; }
  const info = document.getElementById(kind + '-info');
  if (info) info.textContent = '';
  const zt = document.getElementById(kind + '-zone-text');
  if (zt) zt.style.display = '';
}

function setUploadPreview(kind, url, label) {
  const preview = document.getElementById(kind + '-preview');
  if (!preview) return;
  preview.src = url;
  preview.style.display = 'block';  // 明確覆蓋 CSS class 的 display:none
  const zt = document.getElementById(kind + '-zone-text');
  if (zt) zt.style.display = 'none';
  const info = document.getElementById(kind + '-info');
  if (info) info.textContent = label;
}

function handleDrop(e, kind) {
  e.preventDefault();
  document.getElementById(kind + '-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) processImageFile(file, kind);
}

function handleFileSelect(input, kind) {
  const file = input.files[0];
  if (file) processImageFile(file, kind);
}

function processImageFile(file, kind) {
  const maxW = kind === 'cover' ? COVER_MAX_W : 256;
  const maxH = kind === 'cover' ? COVER_MAX_H : 256;
  const origKB = (file.size / 1024).toFixed(1);

  // 立刻顯示原始預覽（不等處理）
  const localUrl = URL.createObjectURL(file);
  setUploadPreview(kind, localUrl, `處理中… （原始 ${origKB} KB）`);

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const ratio = Math.min(maxW / w, maxH / h, 1);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);

      canvas.toBlob(blob => {
        const compressedKB = (blob.size / 1024).toFixed(1);
        const label = `${w}×${h} px　${origKB} KB → ${compressedKB} KB`;
        // 更新預覽為壓縮後版本
        setUploadPreview(kind, URL.createObjectURL(blob), label);
        uploadBlob(blob, kind);
      }, 'image/webp', UPLOAD_QUALITY);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function uploadBlob(blob, kind) {
  const info = document.getElementById(kind + '-info');
  if (info) info.textContent = (info.textContent || '') + '　上傳中…';
  const formData = new FormData();
  formData.append('file', blob, 'image.webp');
  try {
    const res = await fetch(`/api/upload/image?kind=${kind}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData,
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    document.getElementById('f-' + kind).value = data.url;
    if (info) info.textContent = `${data.display}　✓ 已上傳`;
  } catch(e) {
    toast('圖片上傳失敗：' + e.message, true);
  }
}

// ── Utils ─────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BASE + path, opts);
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw data;
  return data;
}
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? 'var(--danger)' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
