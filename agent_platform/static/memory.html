<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的記憶 – AgentHub</title>
<style>
  :root {
    --bg:#0f0f13; --surface:#1a1a24; --border:#2e2e42;
    --accent:#6c63ff; --text:#e8e8f0; --muted:#888;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100dvh;padding:24px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:1.4rem;margin-bottom:6px}
  .sub{color:var(--muted);font-size:.88rem;margin-bottom:20px}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .top-bar a{color:var(--muted);text-decoration:none;font-size:.85rem}
  .top-bar a:hover{color:var(--accent)}
  .toolbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:14px}
  select,button{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.88rem;font-family:inherit;cursor:pointer}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.danger{background:transparent;color:#e29b9b;border-color:#a23e3e}
  button:disabled{opacity:.5;cursor:not-allowed}
  .group{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
  .group-head{padding:10px 14px;font-weight:600;font-size:.92rem;border-bottom:1px solid var(--border);background:#0f0f17;display:flex;justify-content:space-between;align-items:center}
  .group-head .count{color:var(--muted);font-weight:400;font-size:.8rem}
  .fact{padding:10px 14px;display:flex;gap:10px;align-items:flex-start;border-top:1px solid var(--border)}
  .fact:first-of-type{border-top:none}
  .fact .key{color:var(--accent);font-size:.82rem;min-width:140px;font-family:ui-monospace,Menlo,monospace}
  .fact .val{flex:1;font-size:.92rem;line-height:1.5;word-break:break-word}
  .fact .conf{color:var(--muted);font-size:.75rem;align-self:center}
  .fact .del{background:transparent;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:0 4px}
  .fact .del:hover{color:#e05252}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  .msg{padding:10px;border-radius:8px;margin-bottom:12px;font-size:.88rem}
  .msg.ok{background:#1d3a1d;color:#9be29b}
  .msg.err{background:#3a1d1d;color:#e29b9b}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
  .auth-card a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div>
      <a href="/agenthub/static/index.html">← 回首頁</a>
      &nbsp;·&nbsp;
      <a href="/agenthub/static/profile.html">個人設定</a>
    </div>
    <div id="auth-status" style="font-size:.85rem;color:var(--muted)"></div>
  </div>

  <h1>我的記憶</h1>
  <p class="sub">這些是 agent 從你的對話中自動學到的事實,會在新對話開始時提供給 agent 參考。你可以隨時刪除任何一條。</p>

  <div id="msg-area"></div>

  <div id="needs-login" class="auth-card" style="display:none">
    <p>請先 <a href="/agenthub/static/profile.html">登入</a>,記憶功能僅對登入用戶啟用。</p>
  </div>

  <div id="content" style="display:none">
    <div class="toolbar">
      <select id="filter" onchange="render()">
        <option value="">全部分類</option>
        <option value="identity">identity</option>
        <option value="work">work</option>
        <option value="family">family</option>
        <option value="preference">preference</option>
        <option value="interest">interest</option>
        <option value="health">health</option>
        <option value="event">event</option>
        <option value="misc">misc</option>
      </select>
      <button class="danger" onclick="clearAll()">清空全部記憶</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
const JWT_KEY='agenthub_token';
function getJwt(){return localStorage.getItem(JWT_KEY)}
function authHeader(){const t=getJwt();return t?{Authorization:'Bearer '+t}:{}}

function showMsg(text,type='ok'){
  const el=document.getElementById('msg-area');
  el.innerHTML=`<div class="msg ${type}">${esc(text)}</div>`;
  setTimeout(()=>{el.innerHTML=''},3000);
}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

let allFacts=[];

async function init(){
  if(!getJwt()){
    document.getElementById('needs-login').style.display='';
    document.getElementById('auth-status').textContent='未登入';
    return;
  }
  document.getElementById('content').style.display='';
  // user info
  try{
    const r=await fetch('/agenthub/auth/me',{headers:authHeader()});
    if(r.ok){const u=await r.json();document.getElementById('auth-status').innerHTML='已登入:<strong>'+esc(u.username)+'</strong>'}
    else if(r.status===401){localStorage.removeItem(JWT_KEY);return init()}
  }catch{}
  await refresh();
}

async function refresh(){
  try{
    const r=await fetch('/agenthub/api/facts',{headers:authHeader()});
    if(r.status===401){localStorage.removeItem(JWT_KEY);return init()}
    if(!r.ok)throw new Error('載入失敗');
    allFacts=await r.json();
    render();
  }catch(e){showMsg(e.message,'err')}
}

function render(){
  const filter=document.getElementById('filter').value;
  const facts=filter?allFacts.filter(f=>f.category===filter):allFacts;
  const box=document.getElementById('list');
  if(!facts.length){
    box.innerHTML='<div class="empty">尚未學到任何事實。和 agent 多聊聊吧!</div>';
    return;
  }
  // group by category
  const groups={};
  for(const f of facts){(groups[f.category]||(groups[f.category]=[])).push(f)}
  const order=['identity','work','family','preference','interest','health','event','misc'];
  const cats=Object.keys(groups).sort((a,b)=>(order.indexOf(a)+99)-(order.indexOf(b)+99));
  box.innerHTML=cats.map(cat=>`
    <div class="group">
      <div class="group-head">${esc(cat)} <span class="count">${groups[cat].length} 條</span></div>
      ${groups[cat].map(f=>`
        <div class="fact">
          <div class="key">${esc(f.key)}</div>
          <div class="val">${esc(f.value)}</div>
          <div class="conf">${(f.confidence*100|0)}%</div>
          <button class="del" onclick="delFact(${f.id})" title="刪除">×</button>
        </div>
      `).join('')}
    </div>
  `).join('');
}

async function delFact(id){
  if(!confirm('確定刪除這條記憶?'))return;
  const r=await fetch('/agenthub/api/facts/'+id,{method:'DELETE',headers:authHeader()});
  if(!r.ok&&r.status!==204)return showMsg('刪除失敗','err');
  await refresh();
}

async function clearAll(){
  if(!confirm('確定要清空所有記憶?此動作無法復原。'))return;
  const r=await fetch('/agenthub/api/facts',{method:'DELETE',headers:authHeader()});
  if(!r.ok&&r.status!==204)return showMsg('清空失敗','err');
  showMsg('已清空');
  await refresh();
}

init();
</script>
</body>
</html>
